services:
  - type: web
    name: hisabnkash-backend
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hisabnkash-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false   # Set manually: https://your-app.vercel.app

databases:
  - name: hisabnkash-db
    databaseName: hisabnkash
    user: hisabnkash_user
    region: singapore
    plan: free
    ipAllowList: []
